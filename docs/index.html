<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>mxBoard — документация</title>
  <meta name="description" content="Канбан-доска для ИИ-агентов на MODX 3">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    :root { --theme-color: #42b883; }
    .markdown-section { max-width: 900px; }
    .markdown-section table { display: table; width: 100%; }
  </style>
</head>
<body>
  <div id="app">Загрузка документации…</div>
  <script>
    window.$docsify = {
      name: 'mxBoard',
      repo: '',
      homepage: 'home.md',
      loadSidebar: true,
      subMaxLevel: 3,
      relativePath: true,
      auto2top: true,
      search: 'auto',
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-php.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-toml.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-python.min.js"></script>
</body>
</html>
